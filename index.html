<!DOCTYPE html>
<html lang="th" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จารอู๋อยากสอน (AjOUE.Arch) - สารบัญคลิป</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen text-gray-800">

    <div class="bg-white/95 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-gray-200 w-full transition-all">
        <div class="max-w-6xl mx-auto px-3 py-3 md:py-4">
            
            <h1 class="text-2xl md:text-3xl font-extrabold text-red-600 tracking-tight text-center mb-2">
                จารอู๋อยากสอน (AjOUE.Arch)
            </h1>

            <div class="text-center mb-1">
                <button id="toggleMenuBtn" onclick="toggleMenu()" class="inline-flex items-center justify-center gap-1.5 text-[11px] md:text-sm font-bold bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-full shadow-md hover:shadow-lg transition-all transform hover:scale-105 border-2 border-white ring-2 ring-red-100">
                    <span>🔽</span> ซ่อนแถบค้นหาและสารบัญ
                </button>
            </div>
            
            <div id="menuSection" class="mt-3 md:mt-4">
                <div class="mb-3">
                    <input type="text" id="searchInput" placeholder="พิมพ์ค้นหาคลิป หรือชื่อ Playlist (เช่น Case Study, Design)..." 
                           class="w-full bg-gray-100 border border-transparent focus:bg-white focus:border-red-400 rounded-lg px-4 py-2 md:py-2.5 text-sm md:text-base outline-none transition shadow-inner">
                </div>

                <div class="flex items-start gap-2 mb-3">
                    <span class="text-[10px] md:text-xs font-bold text-gray-400 uppercase shrink-0 mt-1.5">ยอดฮิต :</span>
                    <div id="keywordContainer" class="flex flex-wrap gap-1.5 md:gap-2">
                        </div>
                </div>

                <div class="flex items-start gap-2 pt-2 border-t border-gray-100 pb-1">
                    <span class="text-[10px] md:text-xs font-bold text-gray-400 uppercase shrink-0 mt-1">สารบัญ :</span>
                    <div id="quickLinksContainer" class="flex flex-wrap gap-1.5 md:gap-2">
                        </div>
                </div>
            </div>

        </div>
    </div>

    <div class="max-w-6xl mx-auto px-3 md:px-4 py-6 md:py-8">
        <div id="loading" class="flex flex-col items-center justify-center py-12 text-gray-400">
            <svg class="animate-spin h-10 w-10 text-red-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="animate-pulse text-sm md:text-base font-medium">กำลังจัดเรียงข้อมูลคลิปทั้งหมด...</p>
        </div>
        
        <div id="contentContainer" class="space-y-8 md:space-y-12 pb-12"></div>
    </div>

    <script>
        const API_KEY = 'AIzaSyBU629gf0es1XZzU2enRKbOwjxxAqZpsgs'; 
        const CHANNEL_ID = 'UCnZEhE3iRB_y7ZPb-qlmzdA';
        const UPLOADS_PLAYLIST_ID = 'UUnZEhE3iRB_y7ZPb-qlmzdA'; 
        
        let allPlaylistsData = []; 
        const keywords = ['Design', 'Case study', 'Space', 'Presentation', 'Thesis', 'Interior', 'Urban', 'Construction'];

        // ฟังก์ชันสำหรับเปิด/ซ่อนเมนู พร้อมสลับสีปุ่มให้โดดเด่น
        function toggleMenu() {
            const menu = document.getElementById('menuSection');
            const btn = document.getElementById('toggleMenuBtn');

            if (menu.classList.contains('hidden')) {
                // เปิดเมนู -> ปุ่มแดง
                menu.classList.remove('hidden');
                btn.innerHTML = '<span>🔽</span> ซ่อนแถบค้นหาและสารบัญ';
                btn.className = 'inline-flex items-center justify-center gap-1.5 text-[11px] md:text-sm font-bold bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-full shadow-md hover:shadow-lg transition-all transform hover:scale-105 border-2 border-white ring-2 ring-red-100';
            } else {
                // ซ่อนเมนู -> ปุ่มดำ
                menu.classList.add('hidden');
                btn.innerHTML = '<span>▶️</span> แสดงแถบค้นหาและสารบัญ';
                btn.className = 'inline-flex items-center justify-center gap-1.5 text-[11px] md:text-sm font-bold bg-gray-800 hover:bg-gray-900 text-white px-5 py-2 rounded-full shadow-md hover:shadow-lg transition-all transform hover:scale-105 border-2 border-white ring-2 ring-gray-200';
            }
        }

        async function fetchAllPages(urlPart) {
            let items = [];
            let nextPageToken = '';
            do {
                const url = `${urlPart}&maxResults=50&key=${API_KEY}${nextPageToken ? `&pageToken=${nextPageToken}` : ''}`;
                const response = await fetch(url);
                const data = await response.json();
                if(data.items) items.push(...data.items);
                nextPageToken = data.nextPageToken;
            } while (nextPageToken);
            return items;
        }

        async function fetchYouTubeData() {
            try {
                const playlistItems = await fetchAllPages(`https://www.googleapis.com/youtube/v3/playlists?part=snippet&channelId=${CHANNEL_ID}`);
                
                if (playlistItems.length === 0) {
                    document.getElementById('loading').innerText = "ไม่พบข้อมูล กรุณาตรวจสอบการตั้งค่า API Key";
                    return;
                }

                const videosInPlaylists = new Set();

                for (const playlist of playlistItems) {
                    const playlistId = playlist.id;
                    const playlistTitle = playlist.snippet.title;

                    const rawVideos = await fetchAllPages(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${playlistId}`);

                    const videos = rawVideos.map(item => {
                        const videoId = item.snippet.resourceId.videoId;
                        videosInPlaylists.add(videoId); 
                        
                        let desc = (item.snippet.description || '').split('\n')[0].trim();
                        if (!desc) desc = 'ไม่มีคำอธิบายเพิ่มเติม';

                        return {
                            videoId: videoId,
                            title: item.snippet.title,
                            url: `https://www.youtube.com/watch?v=${videoId}`,
                            thumbUrl: item.snippet.thumbnails.maxres ? item.snippet.thumbnails.maxres.url : (item.snippet.thumbnails.medium ? item.snippet.thumbnails.medium.url : 'https://via.placeholder.com/320x180?text=No+Thumbnail'),
                            publishedAt: new Date(item.contentDetails.videoPublishedAt || item.snippet.publishedAt),
                            description: desc
                        };
                    }).filter(video => video.title !== 'Private video' && video.title !== 'Deleted video');

                    videos.sort((a, b) => b.publishedAt - a.publishedAt);

                    if(videos.length > 0) {
                        allPlaylistsData.push({
                            id: `playlist-${playlistId}`,
                            categoryName: playlistTitle,
                            videos: videos
                        });
                    }
                }

                const allUploads = await fetchAllPages(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${UPLOADS_PLAYLIST_ID}`);
                const orphanVideos = [];

                allUploads.forEach(item => {
                    const videoId = item.snippet.resourceId.videoId;
                    if (!videosInPlaylists.has(videoId) && item.snippet.title !== 'Private video' && item.snippet.title !== 'Deleted video') {
                        let desc = (item.snippet.description || '').split('\n')[0].trim();
                        if (!desc) desc = 'ไม่มีคำอธิบายเพิ่มเติม';

                        orphanVideos.push({
                            videoId: videoId,
                            title: item.snippet.title,
                            url: `https://www.youtube.com/watch?v=${videoId}`,
                            thumbUrl: item.snippet.thumbnails.maxres ? item.snippet.thumbnails.maxres.url : (item.snippet.thumbnails.medium ? item.snippet.thumbnails.medium.url : 'https://via.placeholder.com/320x180?text=No+Thumbnail'),
                            publishedAt: new Date(item.contentDetails.videoPublishedAt || item.snippet.publishedAt),
                            description: desc
                        });
                    }
                });

                if (orphanVideos.length > 0) {
                    orphanVideos.sort((a, b) => b.publishedAt - a.publishedAt);
                    allPlaylistsData.push({
                        id: `playlist-others`,
                        categoryName: 'หมวดอื่นๆ (คลิปทั่วไป)',
                        videos: orphanVideos
                    });
                }

                allPlaylistsData.sort((a, b) => {
                    if(a.categoryName === 'หมวดอื่นๆ (คลิปทั่วไป)') return 1;
                    if(b.categoryName === 'หมวดอื่นๆ (คลิปทั่วไป)') return -1;
                    return a.categoryName.localeCompare(b.categoryName, 'th');
                });

                document.getElementById('loading').style.display = 'none';
                renderUI(); 

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loading').innerHTML = "<p class='text-red-500'>เกิดข้อผิดพลาดในการโหลดข้อมูล</p>";
            }
        }

        function renderUI() {
            renderKeywords();
            renderQuickLinks();
            renderContent("");
        }

        function renderKeywords() {
            const container = document.getElementById('keywordContainer');
            keywords.forEach(kw => {
                const btn = document.createElement('button');
                btn.className = 'px-3 py-1 bg-gray-200 hover:bg-red-500 hover:text-white text-gray-700 text-[10px] md:text-xs rounded-full transition font-medium';
                btn.innerText = kw;
                btn.onclick = () => {
                    document.getElementById('searchInput').value = kw;
                    renderContent(kw);
                    if(window.innerWidth < 768) {
                        const menu = document.getElementById('menuSection');
                        if (!menu.classList.contains('hidden')) toggleMenu();
                    }
                };
                container.appendChild(btn);
            });
        }

        function renderQuickLinks() {
            const container = document.getElementById('quickLinksContainer');
            container.innerHTML = '';
            
            allPlaylistsData.forEach(playlist => {
                const link = document.createElement('a');
                link.href = `#${playlist.id}`;
                link.className = 'px-2.5 py-1 bg-white border border-gray-300 hover:border-red-500 hover:text-red-500 text-gray-600 text-[10px] md:text-xs rounded-md transition whitespace-nowrap font-medium';
                link.innerText = playlist.categoryName;
                link.onclick = () => {
                    document.getElementById('searchInput').value = "";
                    renderContent("");
                    if(window.innerWidth < 768) {
                        const menu = document.getElementById('menuSection');
                        if (!menu.classList.contains('hidden')) toggleMenu();
                    }
                };
                container.appendChild(link);
            });
        }

        // ------------------ ระบบจัดการคลิกวิดีโอ ------------------
        
        // 1. ฟังก์ชันคลิกการ์ด (เปิดคำอธิบาย หรือ ไป YouTube)
        window.handleCardClick = function(element, url) {
            const descDiv = element.querySelector('.video-desc-container');
            const btnText = element.querySelector('.btn-text');
            
            if (descDiv.classList.contains('hidden')) {
                // ครั้งแรก: เปิด Description
                descDiv.classList.remove('hidden');
                btnText.innerHTML = 'คลิกอีกครั้งเพื่อเล่นคลิป ▶';
                btnText.classList.remove('bg-black/80', 'text-white');
                btnText.classList.add('bg-red-600', 'text-white', 'font-bold', 'animate-pulse', 'shadow-md');
            } else {
                // ครั้งที่สอง: ไปที่ YouTube
                window.open(url, '_blank');
            }
        };

        // 2. ฟังก์ชันพับเก็บคำอธิบาย
        window.hideDescription = function(event, button) {
            event.stopPropagation(); // หยุดไม่ให้คลิกทะลุไปโดนตัวการ์ด (ป้องกันคลิปเล่นตอนกดพับ)
            const card = button.closest('.group');
            const descDiv = card.querySelector('.video-desc-container');
            const btnText = card.querySelector('.btn-text');

            // พับเก็บ และคืนค่าปุ่มเดิม
            descDiv.classList.add('hidden');
            btnText.innerHTML = 'กดเพื่อดูรายละเอียด';
            btnText.classList.remove('bg-red-600', 'font-bold', 'animate-pulse', 'shadow-md');
            btnText.classList.add('bg-black/80', 'text-white');
        };
        // --------------------------------------------------------

        function renderContent(filterText = "") {
            const container = document.getElementById('contentContainer');
            container.innerHTML = ''; 

            const searchText = filterText.toLowerCase();

            allPlaylistsData.forEach(playlist => {
                let filteredVideos = [];

                if (playlist.categoryName.toLowerCase().includes(searchText)) {
                    filteredVideos = playlist.videos;
                } else {
                    filteredVideos = playlist.videos.filter(v => 
                        v.title.toLowerCase().includes(searchText)
                    );
                }

                if (filteredVideos.length === 0) return;

                const sectionDiv = document.createElement('div');
                sectionDiv.id = playlist.id; 
                sectionDiv.className = 'scroll-mt-40 md:scroll-mt-48 pt-2'; 
                
                const headerDiv = document.createElement('div');
                headerDiv.className = 'flex items-baseline gap-2 md:gap-3 mb-4 md:mb-5 border-b-2 border-red-500 pb-1.5 md:pb-2 inline-block';
                headerDiv.innerHTML = `
                    <h2 class="text-xl md:text-2xl font-bold text-gray-800">${playlist.categoryName}</h2>
                    <span class="text-xs font-medium text-gray-500 bg-gray-200 px-2.5 py-1 rounded-full">${filteredVideos.length} คลิป</span>
                `;
                
                const videoGrid = document.createElement('div');
                videoGrid.className = 'grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 md:gap-6';

                filteredVideos.forEach(video => {
                    const dateStr = video.publishedAt.toLocaleDateString('th-TH', { year: '2-digit', month: 'short', day: 'numeric' });

                    const videoCard = document.createElement('div');
                    videoCard.setAttribute('onclick', `handleCardClick(this, '${video.url}')`);
                    videoCard.className = 'group cursor-pointer flex flex-col bg-white rounded-xl md:rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all border border-gray-100 h-full';
                    
                    videoCard.innerHTML = `
                        <div class="relative overflow-hidden aspect-video bg-gray-200 shrink-0">
                            <img src="${video.thumbUrl}" alt="Thumbnail" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                            <div class="absolute inset-0 bg-black opacity-0 group-hover:opacity-10 transition duration-300"></div>
                            <div class="btn-text absolute bottom-2 right-2 bg-black/80 text-white text-[10px] md:text-xs px-2.5 py-1.5 rounded backdrop-blur-sm transition-all shadow-sm">
                                กดเพื่อดูรายละเอียด
                            </div>
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="text-sm md:text-base font-semibold text-gray-800 leading-snug line-clamp-2 group-hover:text-red-600 transition">${video.title}</h3>
                            <p class="text-[10px] md:text-xs text-gray-400 mt-2 flex items-center gap-1">
                                📅 วันที่ลง: ${dateStr}
                            </p>
                            
                            <div class="video-desc-container hidden mt-3 flex flex-col gap-2">
                                <div class="text-xs md:text-sm text-gray-600 bg-gray-50 p-3 rounded border-l-[3px] border-red-400">
                                    ${video.description}
                                </div>
                                <button onclick="hideDescription(event, this)" class="self-end text-[10px] md:text-xs bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1.5 rounded font-medium transition shadow-sm border border-gray-300 flex items-center gap-1">
                                    🔼 ซ่อนคำอธิบาย
                                </button>
                            </div>
                        </div>
                    `;
                    videoGrid.appendChild(videoCard);
                });

                sectionDiv.appendChild(headerDiv);
                sectionDiv.appendChild(videoGrid);
                container.appendChild(sectionDiv);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderContent(e.target.value);
        });

        fetchYouTubeData();
    </script>
</body>
</html>
