<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สารบัญคลิป - จารอู๋อยากสอน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> .hidden { display: none; } </style>
</head>
<body class="bg-gray-100 font-sans p-6">

    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-red-600 mb-2">จารอู๋อยากสอน (AjOUE.Arch)</h1>
            <p class="text-gray-600">สารบัญคลิปสำหรับนักศึกษาสถาปัตย์ (อัปเดตอัตโนมัติจาก YouTube)</p>
        </div>

        <div class="mb-8">
            <input type="text" id="searchInput" placeholder="ค้นหาคลิปที่สนใจ เช่น Design, Space, Thesis..." 
                   class="w-full p-4 rounded-lg shadow-md border-gray-300 focus:outline-none focus:ring-2 focus:ring-red-500 text-lg">
        </div>

        <div id="loading" class="text-center text-gray-500 my-4 text-lg animate-pulse">กำลังโหลดข้อมูลจากช่อง จารอู๋อยากสอน...</div>
        
        <div id="contentContainer" class="space-y-4"></div>
    </div>

    <script>
        // ใส่ API KEY และ CHANNEL ID ของจารอู๋เรียบร้อยแล้ว
        const API_KEY = 'AIzaSyBU629gf0es1XZzU2enRKbOwjxxAqZpsgs'; 
        const CHANNEL_ID = 'UCnZEhE3iRB_y7ZPb-qlmzdA';
        
        let allPlaylistsData = []; // ตัวแปรเก็บข้อมูลทั้งหมดเพื่อใช้ทำ Search

        // ฟังก์ชันหลักสำหรับดึงข้อมูลจาก YouTube API
        async function fetchYouTubeData() {
            try {
                // 1. ดึงข้อมูล Playlist ทั้งหมดของช่อง
                const playlistUrl = `https://www.googleapis.com/youtube/v3/playlists?part=snippet&channelId=${CHANNEL_ID}&maxResults=50&key=${API_KEY}`;
                const playlistResponse = await fetch(playlistUrl);
                const playlistData = await playlistResponse.json();

                if (!playlistData.items) {
                    document.getElementById('loading').innerText = "ไม่พบข้อมูล กรุณาตรวจสอบการตั้งค่า API Key";
                    return;
                }

                // 2. ดึงวิดีโอในแต่ละ Playlist
                for (const playlist of playlistData.items) {
                    const playlistId = playlist.id;
                    const playlistTitle = playlist.snippet.title;

                    const videosUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${API_KEY}`;
                    const videosResponse = await fetch(videosUrl);
                    const videosData = await videosResponse.json();

                    if(videosData.items) {
                        const videos = videosData.items.map(item => ({
                            title: item.snippet.title,
                            // ตัดคลิปที่โดนลบหรือซ่อนออกไป
                            url: `https://www.youtube.com/watch?v=${item.snippet.resourceId.videoId}`,
                            thumbUrl: item.snippet.thumbnails.medium ? item.snippet.thumbnails.medium.url : 'https://via.placeholder.com/320x180?text=No+Thumbnail'
                        })).filter(video => video.title !== 'Private video' && video.title !== 'Deleted video');

                        // เก็บข้อมูลไว้เฉพาะ Playlist ที่มีคลิป
                        if(videos.length > 0) {
                            allPlaylistsData.push({
                                categoryName: playlistTitle,
                                videos: videos
                            });
                        }
                    }
                }

                document.getElementById('loading').style.display = 'none';
                renderContent(""); // โหลดเสร็จแล้วให้แสดงผลเลย

            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loading').innerText = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
            }
        }

        // ฟังก์ชันสร้างหน้าจอ
        function renderContent(filterText = "") {
            const container = document.getElementById('contentContainer');
            container.innerHTML = ''; 

            allPlaylistsData.forEach(playlist => {
                // กรองวิดีโอตามคำค้นหา
                const filteredVideos = playlist.videos.filter(v => 
                    v.title.toLowerCase().includes(filterText.toLowerCase())
                );

                if (filteredVideos.length === 0) return; // ไม่มีคลิปที่ตรงกับที่ค้นหา ให้ข้ามไป

                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'bg-white rounded-lg shadow-md overflow-hidden';
                
                const headerDiv = document.createElement('div');
                headerDiv.className = 'p-4 bg-gray-800 text-white cursor-pointer font-bold text-xl flex justify-between items-center transition hover:bg-gray-700';
                headerDiv.innerHTML = `${playlist.categoryName} <span class="text-sm bg-red-600 px-2 py-1 rounded">${filteredVideos.length} คลิป</span>`;
                
                const videoGrid = document.createElement('div');
                videoGrid.className = 'p-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4';
                
                // ถ้าค้นหาอยู่ ให้กาง Dropdown อัตโนมัติ ถ้าไม่ได้ค้นหาให้พับเก็บไว้
                if (filterText === "") videoGrid.classList.add('hidden');

                // ตั้งค่าให้คลิกเพื่อกาง/พับ Playlist
                headerDiv.onclick = () => videoGrid.classList.toggle('hidden');

                filteredVideos.forEach(video => {
                    const videoCard = document.createElement('a');
                    videoCard.href = video.url;
                    videoCard.target = '_blank';
                    videoCard.className = 'block hover:bg-gray-50 p-2 rounded transition border border-gray-100 hover:shadow-lg';
                    videoCard.innerHTML = `
                        <img src="${video.thumbUrl}" alt="Thumbnail" class="w-full rounded-md mb-2 object-cover aspect-video">
                        <h3 class="text-sm font-semibold text-gray-800 leading-tight">${video.title}</h3>
                    `;
                    videoGrid.appendChild(videoCard);
                });

                categoryDiv.appendChild(headerDiv);
                categoryDiv.appendChild(videoGrid);
                container.appendChild(categoryDiv);
            });
        }

        // ตั้งค่าระบบค้นหาแบบ Real-time
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderContent(e.target.value);
        });

        // เริ่มต้นดึงข้อมูลทันทีที่เปิดเว็บ
        fetchYouTubeData();
    </script>
</body>
</html>
